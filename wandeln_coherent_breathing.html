<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wandeln · Coherent Breathing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, serif;
  background: #0A1520;
  color: #F0EAD6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px 24px 32px;
  overflow-y: auto;
  user-select: none;
}

.brand {
  font-size: 12px;
  letter-spacing: 4px;
  color: #C99400;
  margin-bottom: 4px;
  text-transform: uppercase;
  text-align: center;
}

.subtitle {
  font-size: 11px;
  color: #8A7A5A;
  margin-bottom: 24px;
  font-style: italic;
  letter-spacing: 1px;
  text-align: center;
}

.center-row {
  display: flex;
  align-items: center;
  gap: 28px;
  margin-bottom: 20px;
}

.track-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.track-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
}

.lbl-in  { color: #1D7A6B; }
.lbl-out { color: #C99400; }

.track-wrap {
  position: relative;
  width: 28px;
  height: 220px;
}

.track-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 100%;
  background: linear-gradient(to bottom, #1D7A6B, #0F1F2E, #C99400);
  border-radius: 2px;
  opacity: 0.5;
}

.ball {
  position: absolute;
  left: 50%;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle at 35% 35%, #4DB8A8, #1D7A6B);
  box-shadow: 0 0 16px rgba(29,122,107,0.7), 0 0 32px rgba(29,122,107,0.3);
  top: 0px;
  transition: background 1.5s ease, box-shadow 1.5s ease;
}

.ball.exhale {
  background: radial-gradient(circle at 35% 35%, #E8B830, #C99400);
  box-shadow: 0 0 16px rgba(201,148,0,0.7), 0 0 32px rgba(201,148,0,0.3);
}

.info-col {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
  min-width: 120px;
}

.phase-block { display: flex; flex-direction: column; gap: 2px; }

.phase-tag {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #4A3A1A;
  transition: color 0.8s;
}
.phase-tag.inhale { color: #1D7A6B; }
.phase-tag.exhale { color: #C99400; }

.phase-count {
  font-size: 56px;
  line-height: 1;
  color: #F0EAD6;
}

.divider { width: 100%; height: 1px; background: #1A2E3A; }

.stat-row { display: flex; flex-direction: column; gap: 8px; }

.stat-line {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-lbl {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #3A4A5A;
  min-width: 36px;
}

.hrv-bg {
  width: 76px;
  height: 3px;
  background: #1A2E3A;
  border-radius: 3px;
  overflow: hidden;
}

.hrv-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, #1D7A6B, #C99400);
  border-radius: 3px;
  transition: width 0.5s ease;
}

.cycle-val { font-size: 11px; color: #5A6A7A; letter-spacing: 1px; }

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 300px;
}

.ctrl-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
}

.ctrl-lbl {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #3A4A5A;
  min-width: 38px;
  text-align: right;
}

.dur-btn {
  background: none;
  border: 1px solid #1A2E3A;
  color: #3A4A5A;
  font-family: Georgia, serif;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 5px 11px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.dur-btn.active, .dur-btn:hover { border-color: #C99400; color: #C99400; }

.toggle {
  width: 36px;
  height: 18px;
  background: #C99400;
  border-radius: 18px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.3s;
  flex-shrink: 0;
}
.toggle.off { background: #1A2E3A; }
.toggle-knob {
  position: absolute;
  top: 2px;
  left: 20px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #F0EAD6;
  transition: left 0.3s;
}
.toggle.off .toggle-knob { left: 2px; }

.snd-lbl { font-size: 11px; color: #3A4A5A; letter-spacing: 1px; min-width: 24px; }

.btn-row { display: flex; gap: 10px; margin-top: 4px; }

.btn {
  background: none;
  border: 1.5px solid #C99400;
  color: #C99400;
  font-family: Georgia, serif;
  font-size: 13px;
  letter-spacing: 3px;
  padding: 10px 28px;
  border-radius: 40px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  text-transform: uppercase;
}
.btn:hover { background: #C99400; color: #0A1520; }

.btn-sec {
  background: none;
  border: 1.5px solid #1A2E3A;
  color: #3A4A5A;
  font-family: Georgia, serif;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 8px 18px;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-sec:hover { background: #1A2E3A; color: #F0EAD6; }

.verse {
  margin-top: 20px;
  font-size: 11px;
  color: #2A1A0A;
  text-align: center;
  font-style: italic;
  max-width: 240px;
  line-height: 1.9;
}

.done-screen { display: none; flex-direction: column; align-items: center; gap: 14px; text-align: center; margin-top: 40px; }
.done-screen.visible { display: flex; }
.done-title { font-size: 20px; color: #C99400; letter-spacing: 2px; }
.done-sub { font-size: 12px; color: #6A5A3A; max-width: 240px; line-height: 1.9; font-style: italic; }
</style>
</head>
<body>

<div id="mainScreen">
  <div class="brand">Wandeln</div>
  <div class="subtitle">Coherent Breathing · 5,5 Atemzüge/min · HRV-Training</div>

  <div class="center-row">
    <div class="track-col">
      <div class="track-label lbl-in">Ein</div>
      <div class="track-wrap">
        <div class="track-line"></div>
        <div class="ball" id="ball"></div>
      </div>
      <div class="track-label lbl-out">Aus</div>
    </div>

    <div class="info-col">
      <div class="phase-block">
        <div class="phase-tag" id="phaseTag">Bereit</div>
        <div class="phase-count" id="countdown">5</div>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <div class="stat-line">
          <div class="stat-lbl">HRV</div>
          <div class="hrv-bg"><div class="hrv-fill" id="hrvFill"></div></div>
        </div>
        <div class="stat-line">
          <div class="stat-lbl">Zyklen</div>
          <div class="cycle-val" id="cycleVal">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-row">
      <div class="ctrl-lbl">Dauer</div>
      <button class="dur-btn active" onclick="setDur(5,this)">5 min</button>
      <button class="dur-btn" onclick="setDur(10,this)">10 min</button>
      <button class="dur-btn" onclick="setDur(20,this)">20 min</button>
    </div>

    <div class="ctrl-row">
      <div class="ctrl-lbl">Ton</div>
      <div class="toggle" id="sndToggle" onclick="toggleSound()">
        <div class="toggle-knob"></div>
      </div>
      <span class="snd-lbl" id="sndLabel">An</span>
    </div>

    <div class="btn-row">
      <button class="btn" id="startBtn" onclick="handleStart()">Start</button>
      <button class="btn-sec" id="stopBtn" onclick="stopSession()" style="display:none">Stop</button>
    </div>
  </div>

  <div class="verse">
    „Der Friede Gottes, der allen Verstand übersteigt,<br>
    wird eure Herzen bewachen."<br>Phil 4,7
  </div>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-title">Session abgeschlossen</div>
  <div class="done-sub" id="doneSub"></div>
  <button class="btn" onclick="resetSession()">Nochmal</button>
  <div class="verse" style="margin-top:12px">
    „Der Herr ist nahe."<br>Phil 4,5
  </div>
</div>

<script>
var INHALE = 5, EXHALE = 5;
var BALL_TOP = 0, BALL_BTM = 194;

var running = false, soundOn = true, durMin = 5;
var elapsed = 0, cycles = 0;
var phase = 'inhale', phaseSec = INHALE;
var pTimer = null, cTimer = null;
var ctx = null, osc = null, gainNode = null;

var ball     = document.getElementById('ball');
var phaseTag = document.getElementById('phaseTag');
var cdEl     = document.getElementById('countdown');
var hrvFill  = document.getElementById('hrvFill');
var cycleVal = document.getElementById('cycleVal');
var startBtn = document.getElementById('startBtn');
var stopBtn  = document.getElementById('stopBtn');
var mainScr  = document.getElementById('mainScreen');
var doneSc   = document.getElementById('doneScreen');

function initAudio() {
  if (ctx) return;
  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, ctx.currentTime);
    gainNode.connect(ctx.destination);
  } catch(e) { soundOn = false; }
}

function playTone(freq, durSec) {
  if (!soundOn || !ctx) return;
  try {
    if (osc) { try { osc.stop(); } catch(e){} osc.disconnect(); }
    osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.connect(gainNode);
    var t = ctx.currentTime;
    gainNode.gain.cancelScheduledValues(t);
    gainNode.gain.setValueAtTime(0, t);
    gainNode.gain.linearRampToValueAtTime(0.09, t + 0.8);
    gainNode.gain.linearRampToValueAtTime(0.06, t + durSec - 1.2);
    gainNode.gain.linearRampToValueAtTime(0, t + durSec - 0.1);
    osc.start(t);
    osc.stop(t + durSec);
  } catch(e) {}
}

function moveBall(toBottom, sec) {
  ball.style.transition = 'top ' + sec + 's cubic-bezier(0.45,0,0.55,1), background 1.5s ease, box-shadow 1.5s ease';
  ball.style.top = (toBottom ? BALL_BTM : BALL_TOP) + 'px';
}

function startPhase(p) {
  phase = p;
  phaseSec = (p === 'inhale') ? INHALE : EXHALE;
  phaseTag.textContent = (p === 'inhale') ? 'Einatmen' : 'Ausatmen';
  phaseTag.className = 'phase-tag ' + p;
  ball.className = 'ball' + (p === 'exhale' ? ' exhale' : '');
  moveBall(p === 'exhale', phaseSec);
  playTone(p === 'inhale' ? 174 : 136, phaseSec);
  cdEl.textContent = phaseSec;
  var c = phaseSec;
  clearInterval(cTimer);
  cTimer = setInterval(function() {
    c--;
    if (c >= 0) cdEl.textContent = c;
  }, 1000);
}

function tick() {
  if (!running) return;
  elapsed++;
  if (elapsed >= durMin * 60) { finish(); return; }
  if (phase === 'inhale') {
    startPhase('exhale');
    pTimer = setTimeout(tick, EXHALE * 1000);
  } else {
    cycles++;
    cycleVal.textContent = cycles;
    hrvFill.style.width = Math.min((cycles / (durMin * 6)) * 100, 100) + '%';
    startPhase('inhale');
    pTimer = setTimeout(tick, INHALE * 1000);
  }
}

function handleStart() {
  initAudio();
  running = true; elapsed = 0; cycles = 0;
  cycleVal.textContent = '0';
  hrvFill.style.width = '0%';
  startBtn.style.display = 'none';
  stopBtn.style.display = 'inline-block';
  startPhase('inhale');
  pTimer = setTimeout(tick, INHALE * 1000);
}

function stopSession() {
  running = false;
  clearTimeout(pTimer); clearInterval(cTimer);
  try { if (osc) { gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3); osc.stop(ctx.currentTime + 0.3); } } catch(e){}
  ball.style.transition = 'top 0.5s ease';
  ball.style.top = BALL_TOP + 'px';
  ball.className = 'ball';
  phaseTag.textContent = 'Bereit'; phaseTag.className = 'phase-tag';
  cdEl.textContent = '5';
  startBtn.style.display = 'inline-block';
  stopBtn.style.display = 'none';
}

function finish() {
  running = false;
  clearTimeout(pTimer); clearInterval(cTimer);
  try { if (osc) osc.stop(); } catch(e){}
  mainScr.style.display = 'none';
  doneSc.classList.add('visible');
  document.getElementById('doneSub').innerHTML =
    durMin + ' Minuten &middot; ' + cycles + ' Atemzyklen<br><br>' +
    'Dein Vagusnerv ist aktiv.<br>Das neuroplastische Fenster ist offen.';
}

function resetSession() {
  cycles = 0; elapsed = 0;
  doneSc.classList.remove('visible');
  mainScr.style.display = 'flex';
  mainScr.style.flexDirection = 'column';
  mainScr.style.alignItems = 'center';
  hrvFill.style.width = '0%';
  cycleVal.textContent = '0';
  phaseTag.textContent = 'Bereit'; phaseTag.className = 'phase-tag';
  cdEl.textContent = '5';
  ball.style.transition = 'none';
  ball.style.top = BALL_TOP + 'px';
  ball.className = 'ball';
  startBtn.style.display = 'inline-block';
  stopBtn.style.display = 'none';
}

function setDur(min, el) {
  durMin = min;
  var btns = document.querySelectorAll('.dur-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  el.classList.add('active');
}

function toggleSound() {
  soundOn = !soundOn;
  var t = document.getElementById('sndToggle');
  var l = document.getElementById('sndLabel');
  t.className = 'toggle' + (soundOn ? '' : ' off');
  l.textContent = soundOn ? 'An' : 'Aus';
  if (!soundOn && osc) { try { osc.stop(); } catch(e){} }
}
</script>
</body>
</html>
